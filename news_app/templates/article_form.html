{% extends "base.html" %}
{% block title %}Article - AL News{% endblock %}
{% block content %}
<div class="form-panel">
    <h1>{{ "Modifier l'article" if article else "Nouvel article" }}</h1>
    <form method="post">
        <label>
            Titre
            <input name="title" required value="{{ article.title if article else '' }}">
        </label>
        <label>
            Resume
            <textarea name="summary" required rows="3">{{ article.summary if article else '' }}</textarea>
        </label>
        <label>
            Contenu
            <textarea name="content" required rows="10">{{ article.content if article else '' }}</textarea>
        </label>
        <label>
            Categorie
            <select name="category_id" required>
                {% for category in categories %}
                    <option value="{{ category.id }}" {% if article and article.category_id == category.id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                {% endfor %}
            </select>
        </label>
        <label class="check">
            <input type="checkbox" name="published" {% if not article or article.published %}checked{% endif %}>
            Publie
        </label>
        <button class="button primary" type="submit">Enregistrer</button>
    </form>
</div>
{% endblock %}
